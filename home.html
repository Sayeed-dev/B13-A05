<!doctype html>
<html data-theme="default">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- FontAwsome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Main CSS -->
    <link href="./src/output.css" rel="stylesheet" />
  </head>
  <body class="">
    <header class="max-w-full shadow-sm bg-gray-100">
      <div class="navbar w-10/12 mx-auto px-0">
        <div class="flex-1">
          <a class="btn btn-ghost text-xl">
            <i class="fa-brands fa-github text-3xl"></i>
            <h2 class="text-2xl font-extrabold">Github Issues Tracker</h2>
          </a>
        </div>
        <div class="flex gap-2">
          <input
            type="text"
            placeholder="Search"
            class="input input-bordered w-24 md:w-auto"
          />
          <button class="btn btn-outline">Search</button>
        </div>
      </div>
    </header>

    <section class="w-8/12 mx-auto flex mt-10">
      <button class="btn">All</button>
      <button class="btn">Open</button>
      <button class="btn">Closed</button>
    </section>

    <section class="w-8/12 mx-auto mt-10">
      <div class="issues-header w-full flex justify-between">
        <div class="flex items-center gap-2.5">
          <i class="fas fa-exclamation-circle text-orange-500 text-5xl"></i>
          <div>
            <h2 class="text-xl font-extrabold">50 issues</h2>
            <p class="font-semibold text-gray-500">
              Track & Manage your project issues.
            </p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 bg-green-600 rounded-full"></div>
          <p class="font-semibold">Open</p>
          <div class="w-3 h-3 bg-red-600 rounded-full"></div>
          <p class="font-semibold">Close</p>
        </div>
      </div>
      <div class="issues-container grid md:grid-cols-4 grid-cols-2 mt-10">
        <div
          class="issue-card p-5 w-full shadow-2xl rounded-2xl border-t-3 border-t-green-600"
        >
          <div class="card-header flex justify-between items-center w-full">
            <div class="w-4 h-4 bg-green-600 rounded-full"></div>
            <div class="indicator bg-amber-200 rounded-full py-1 px-2.5">
              <p>High</p>
            </div>
          </div>
          <h2 class="font-semibold text-xl my-3">
            Fix navigation menu on mobile devices
          </h2>
          <p class="text-grey-500">The navigation menu doesn't collapse properly on mobile devices...</p>
          <div class="bugs-area flex items-center justify-between my-3">
            <div class=" bg-red-200 rounded-full py-1 px-2.5 flex gap-1 items-center p-1">
              <i class="fas fa-bug"></i></i><p>BUGS</p>
            </div>
            <div class=" bg-amber-200 rounded-full py-1 px-2.5 flex gap-1 items-center p-1">
              <i class="fas fa-question-circle"></i><p>HELP</p>
            </div>
          </div>
          <h2 class="author font-semibold">John Doe</h2>
          <h3 class="date mt-1">0/0/2000</h3>
        </div>
      </div>
    </section>

    <script src="./src/scripts/app.js"></script>
  </body>
</html>
