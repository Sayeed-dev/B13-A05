<!doctype html>
<html data-theme="default">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- FontAwsome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Main CSS -->
    <link href="./src/output.css" rel="stylesheet" />
  </head>
  <body class="">
    <header class="max-w-full shadow-sm bg-gray-100">
      <div class="navbar w-10/12 mx-auto px-0">
        <div class="flex-1">
          <a class="btn btn-ghost text-xl">
            <i class="fa-brands fa-github text-3xl"></i>
            <h2 class="text-2xl font-extrabold">Github Issues Tracker</h2>
          </a>
        </div>
        <div class="flex gap-2">
          <input
            type="text"
            placeholder="Search"
            class="input searchBox input-bordered w-24 md:w-auto"
          />
        </div>
      </div>
    </header>

    <section class="w-10/12 mx-auto flex mt-10">
      <button class="toogle btn btn-neutral">All</button>
      <button class="toogle btn">Open</button>
      <button class="toogle btn">Closed</button>
    </section>

    <section class="w-10/12 mx-auto mt-10">
      <div class="issues-header w-full flex justify-between">
        <div class="flex items-center gap-2.5">
          <i class="fas fa-exclamation-circle text-orange-500 text-5xl"></i>
          <div>
            <h2 class="issues-counter text-xl font-extrabold">50 issues</h2>
            <p class="font-semibold text-gray-500">
              Track & Manage your project issues.
            </p>
          </div>
        </div>

        <div class="flex items-center gap-2">
          <div class="w-3 h-3 bg-green-600 rounded-full"></div>
          <p class="font-semibold">Open</p>
          <div class="w-3 h-3 bg-red-600 rounded-full"></div>
          <p class="font-semibold">Close</p>
        </div>
      </div>

      <!-- Spinner -->
      <div
        class="spinner-container flex justify-center items-center mt-28 w-full hidden"
      >
        <span class="loading loading-spinner loading-xl"></span>
      </div>

      <div
        class="issues-container grid md:grid-cols-4 grid-cols-2 mt-10 gap-6"
      ></div>
    </section>

    <!-- Modal -->

    <!-- Open the modal using ID.showModal() method -->

    <dialog id="my_modal" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box"></div>
    </dialog>

    <script src="./src/scripts/home.js"></script>
  </body>
</html>
